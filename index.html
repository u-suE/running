<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランニング記録</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
    }

    h1 {
      margin: 0;
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      font-size: 20px;
    }

    #info {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      line-height: 1.8;
    }

    #buttons {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    #map {
      width: 100%;
      height: calc(100vh - 190px);
    }
  </style>
</head>
<body>
  <h1>ランニング記録</h1>

  <div id="info">
    <div>距離: <span id="distance">0.00</span> km</div>
    <div>時間: <span id="time">00:00</span></div>
    <div>状態: <span id="status">待機中</span></div>
  </div>

  <div id="buttons">
    <button id="startBtn">スタート</button>
    <button id="stopBtn">ストップ</button>
    <button id="resetBtn">リセット</button>
  </div>

  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="fn.js"></script>
</body>
</html>
